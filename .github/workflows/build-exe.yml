name: Build Windows EXE

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade pyinstaller

      - name: Build iDanmu EXE
        run: .\build-exe.bat

      - name: Build iDanmuMini EXE
        run: .\mini_gui\build-mini-exe.bat

      - name: Pack build outputs
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\iDanmu\iDanmu.exe")) {
            throw "iDanmu.exe was not generated."
          }
          if (-not (Test-Path "mini_gui\dist\iDanmuMini\iDanmuMini.exe")) {
            throw "iDanmuMini.exe was not generated."
          }

          Compress-Archive -Path "dist\iDanmu" -DestinationPath "iDanmu-win-x64.zip" -Force
          Compress-Archive -Path "mini_gui\dist\iDanmuMini" -DestinationPath "iDanmuMini-win-x64.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-bundles
          path: |
            iDanmu-win-x64.zip
            iDanmuMini-win-x64.zip
          retention-days: 14

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            iDanmu-win-x64.zip
            iDanmuMini-win-x64.zip
          generate_release_notes: true
