name: Build Windows EXE

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
      - "*.*.*"
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade pyinstaller

      - name: Build iDanmu EXE
        run: .\build-exe.bat

      - name: Build iDanmuMini EXE
        run: .\mini_gui\build-mini-exe.bat

      - name: Pack build outputs
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\iDanmu.exe")) {
            throw "iDanmu.exe was not generated."
          }
          if (-not (Test-Path "mini_gui\dist\iDanmuMini.exe")) {
            throw "iDanmuMini.exe was not generated."
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-files
          path: |
            dist/iDanmu.exe
            mini_gui/dist/iDanmuMini.exe
          retention-days: 14

      - name: Publish GitHub Release assets
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          artifacts: dist/iDanmu.exe,mini_gui/dist/iDanmuMini.exe
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
          generateReleaseNotes: true
